name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Build Chrome extension
      run: node build.js --prod --target chrome

    - name: Build Firefox extension
      run: node build.js --prod --target firefox

    - name: Zip Chrome extension
      working-directory: dist/chrome
      run: zip -r ../../feskpaste-chrome-${GITHUB_REF_NAME}.zip .

    - name: Zip Firefox extension
      working-directory: dist/firefox
      run: zip -r ../../feskpaste-firefox-${GITHUB_REF_NAME}.zip .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          feskpaste-chrome-*.zip
          feskpaste-firefox-*.zip
